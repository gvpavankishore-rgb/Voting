<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Select Your Party</h2>

{% for p in parties %}
<div class="card">
    <img src="{{ p.symbol }}" width="80"><br>
    <h3>{{ p.name }}</h3>

<!-- 👉 selected party id send -->

    <a href="/fingerprint/{{ p.id }}">
        <button>Select</button>
    </a>
</div>
{% endfor %}

</body>
</html>
