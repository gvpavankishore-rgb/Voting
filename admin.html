<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Admin Panel</h2>

<div class="container">

    <h3>Add Voter</h3>
    <form method="POST">
        <input type="text" name="name" placeholder="Name" required><br>
        <input type="text" name="voter_id" placeholder="Voter ID" required><br>
        <input type="text" name="aadhar" placeholder="Aadhar" required><br>
        <button type="submit">Add Voter</button>
    </form>

    <hr>

    <h3>Voter List</h3>

    {% for v in voters %}
        <div class="card">
            <p><b>{{ v.name }}</b></p>
            <p>ID: {{ v.voter_id }}</p>
            <p>Aadhar: {{ v.aadhar }}</p>

            <a href="/delete_voter/{{ v.id }}">
                <button style="background:red;">Delete</button>
            </a>
        </div>
    {% endfor %}

</div>

</body>
</html>
